  <!-- Tooth icon (top-right) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.2">
    <!-- Outer tooth outline (gray, hand-drawn feel) -->
    <path d="M163 18 C 154 16, 149 24, 150 36 C 151 47, 152 58, 156 70 C 159 80, 168 84, 173 76 C 177 70, 178 58, 180 50 C 182 58, 183 70, 188 76 C 193 84, 202 80, 205 70 C 209 58, 210 47, 211 36 C 212 24, 207 16, 198 18 C 191 19, 186 23, 180 26 C 174 23, 170 19, 163 18 Z"
